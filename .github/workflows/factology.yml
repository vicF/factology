name: Full Test Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  tests:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: securerootpassword
          MYSQL_DATABASE: factology_testing
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          extensions: pdo_mysql, mbstring, dom, fileinfo, bcmath, zip
          coverage: none

      - name: Setup Node - Frontend (Vue)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: List directory structure (debug)
        run: |
          pwd
          ls -la
          ls -la factology/ || echo "factology directory not found"

      - name: Copy environment for CI
        run: |
          cd factology
          if [ -f .env.github ]; then
            cp .env.github .env
          elif [ -f .env.example ]; then
            cp .env.example .env
          else
            echo "No environment file found"
            exit 1
          fi
          echo "APP_URL=http://localhost:8005" > ../tests-js/.env

      - name: Install PHP dependencies
        working-directory: factology
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Install Vue dependencies
        working-directory: factology
        run: npm install

      - name: Install CodeceptJS dependencies
        working-directory: tests-js
        run: npm install

      - name: Install Playwright browsers
        working-directory: tests-js
        run: npx playwright install chromium --with-deps

      - name: Generate application key
        working-directory: factology
        run: php artisan key:generate

      - name: Run database migrations
        working-directory: factology
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: factology_testing
          DB_USERNAME: root
          DB_PASSWORD: securerootpassword
        run: php artisan migrate:fresh --seed --force

      - name: Build frontend assets
        working-directory: factology
        run: npm run build

      - name: Start Laravel development server
        working-directory: factology
        env:
          APP_ENV: testing
          APP_URL: http://localhost:8005
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: factology_testing
          DB_USERNAME: root
          DB_PASSWORD: securerootpassword
        run: |
          php artisan serve --host=0.0.0.0 --port=8005 &
          sleep 5  # Wait for server to start

      - name: Run PHPUnit/Feature tests
        working-directory: factology
        env:
          APP_ENV: testing
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: factology_testing
          DB_USERNAME: root
          DB_PASSWORD: securerootpassword
        run: php artisan test --colors=always

      - name: Run CodeceptJS E2E tests (headless)
        working-directory: tests-js
        env:
          CI: true
          HEADLESS: true
          APP_URL: http://localhost:8005
        run: npx codeceptjs run --steps --verbose

      - name: Upload test artifacts (if tests fail)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-artifacts
          path: |
            tests-js/output/
            factology/storage/logs/
            tests-js/screenshots/
