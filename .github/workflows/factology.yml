name: Full Test Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  tests:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: securerootpassword
          MYSQL_DATABASE: factology_tmp_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          extensions: pdo_mysql, mbstring, dom, fileinfo, bcmath, zip
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create .env file
        run: |
          cat > .env << 'EOF'
          APP_ENV=testing
          APP_KEY=
          APP_DEBUG=true
          APP_URL=http://localhost:8005
          DB_CONNECTION=mysql
          DB_HOST=127.0.0.1
          DB_PORT=3306
          DB_DATABASE=factology_tmp_test
          DB_USERNAME=root
          DB_PASSWORD=securerootpassword
          EOF

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Dump autoload
        run: composer dump-autoload

      - name: Clear Laravel caches
        run: |
          php artisan config:clear
          php artisan cache:clear
          php artisan view:clear
          php artisan route:clear

      - name: Create missing middleware for CI (does not affect local)
        run: |
          # Create VerifyCsrfToken middleware if it doesn't exist
          if [ ! -f app/Http/Middleware/VerifyCsrfToken.php ]; then
            mkdir -p app/Http/Middleware
            cat > app/Http/Middleware/VerifyCsrfToken.php << 'MIDDLEWARE'
  <?php

  namespace App\Http\Middleware;

  use Illuminate\Foundation\Http\Middleware\VerifyCsrfToken as Middleware;

  class VerifyCsrfToken extends Middleware
  {
    protected $except = [
    'api/*',
  ];
  }
  MIDDLEWARE
  echo "Created VerifyCsrfToken middleware for CI"
  else
  echo "VerifyCsrfToken middleware already exists"
  fi

- name: Install Node dependencies
  run: |
    # Clean install to avoid platform-specific issues
    rm -rf node_modules package-lock.json
    npm install --no-optional --no-audit --no-fund
    # Verify rollup is installed
    npx rollup --version || echo "Rollup installed"

- name: Install Playwright browsers
  run: npx playwright install chromium --with-deps

- name: Generate application key
  run: php artisan key:generate

- name: Run database migrations
  env:
    APP_ENV: testing
  run: php artisan migrate:fresh --seed --force

- name: Build frontend assets
  run: npm run build

- name: Start Laravel server with detailed logging
  env:
    APP_ENV: testing
    APP_DEBUG: true
    APP_URL: http://localhost:8005
    LOG_CHANNEL: single
  run: |
    # Enable query logging and error logging
    php artisan serve --host=0.0.0.0 --port=8005 > server.log 2>&1 &
    sleep 10
    echo "Server started"
    echo "=== Checking server status ==="
    curl -v http://localhost:8005 2>&1 | head -30

- name: Test API endpoint with detailed error
  run: |
    echo "=== Testing /api/test/status ==="
    curl -v http://localhost:8005/api/test/status 2>&1
    echo ""
    echo "=== Testing homepage ==="
    curl -v http://localhost:8005 2>&1 | head -50
    echo ""
    echo "=== Checking Laravel logs ==="
    cat storage/logs/laravel.log 2>/dev/null || echo "No log file yet"

- name: Debug environment
  run: |
    echo "APP_ENV from .env:"
    grep APP_ENV .env
    echo ""
    echo "Current environment from artisan:"
    php artisan tinker --execute="echo app()->environment();"
    echo ""
    echo "Checking middleware files:"
    ls -la app/Http/Middleware/ || echo "Middleware directory not found"
    echo ""
    echo "Checking if VerifyCsrfToken exists:"
    php -r "if (class_exists('App\Http\Middleware\VerifyCsrfToken')) { echo '✓ VerifyCsrfToken class found\n'; } else { echo '✗ VerifyCsrfToken class NOT found\n'; }"
    echo ""
    echo "Checking route list for test routes:"
    php artisan route:list | grep test || echo "No test routes found"

- name: Run PHPUnit tests
  env:
    APP_ENV: testing
  run: php artisan test --colors=always

- name: Run CodeceptJS tests with debug output
  working-directory: tests-js
  env:
    CI: true
    HEADLESS: true
    APP_URL: http://localhost:8005
  run: |
    echo "=== Running CodeceptJS tests ==="
    npx codeceptjs run --steps --verbose --debug 2>&1 | tee test-output.log
    echo ""
    echo "=== Checking server logs after tests ==="
    cat ../storage/logs/laravel.log 2>/dev/null | tail -100 || echo "No logs"

- name: Upload test artifacts
  uses: actions/upload-artifact@v4
  if: always()
  with:
    name: test-artifacts
    path: |
      tests-js/output/
      storage/logs/
      server.log
      tests-js/test-output.log

- name: Upload full debug logs
  uses: actions/upload-artifact@v4
  if: failure()
  with:
    name: debug-logs
    path: |
      storage/logs/laravel.log
      server.log
      .env
      tests-js/test-output.log
