name: Full Test Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  tests:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: securerootpassword
          MYSQL_DATABASE: factology_tmp_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          extensions: pdo_mysql, mbstring, dom, fileinfo, bcmath, zip
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create .env file
        run: |
          cat > .env << 'EOF'
          APP_ENV=testing
          APP_KEY=
          APP_DEBUG=true
          APP_URL=http://localhost:8005
          DB_CONNECTION=mysql
          DB_HOST=127.0.0.1
          DB_PORT=3306
          DB_DATABASE=testing
          DB_USERNAME=root
          DB_PASSWORD=securerootpassword
          EOF

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Install Node dependencies
        run: npm ci --omit=optional --no-audit --no-fund

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Generate application key
        run: php artisan key:generate

      - name: Run database migrations
        env:
          APP_ENV: testing
        run: php artisan migrate:fresh --seed --force

      - name: Build frontend assets
        run: npm run build

      - name: Start Laravel server
        env:
          APP_ENV: testing
          APP_URL: http://localhost:8005
        run: |
          php artisan serve --host=0.0.0.0 --port=8005 &
          sleep 10
          echo "Verifying server is running..."
          curl -f http://localhost:8005 || (echo "Server failed to start" && exit 1)
          echo "Checking test routes..."
          curl -f http://localhost:8005/api/test/status || echo "Test routes not available yet"

      - name: Debug environment
        run: |
          echo "APP_ENV from .env:"
          grep APP_ENV .env
          echo ""
          echo "Current environment from artisan:"
          php artisan tinker --execute="echo app()->environment();"

      - name: Run PHPUnit tests
        env:
          APP_ENV: testing
        run: php artisan test --colors=always

      - name: Run CodeceptJS tests
        working-directory: tests-js
        env:
          CI: true
          HEADLESS: true
          APP_URL: http://localhost:8005
        run: npx codeceptjs run --steps --verbose

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-artifacts
          path: |
            tests-js/output/
            storage/logs/
