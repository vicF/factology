name: Full Test Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: securerootpassword
          POSTGRES_DB: factology_tmp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          extensions: pdo_pgsql, mbstring, dom, fileinfo, bcmath, zip, curl, json, xml
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create .env file
        run: |
          cat > .env << 'EOF'
          APP_NAME="Factology Testing"
          APP_ENV=testing
          APP_KEY=
          APP_DEBUG=true
          APP_URL=http://localhost:8005
          APP_PORT=8005
          DB_CONNECTION=pgsql
          DB_HOST=127.0.0.1
          DB_PORT=5432
          DB_DATABASE=factology_tmp_test
          DB_USERNAME=root
          DB_PASSWORD=securerootpassword
          LOG_CHANNEL=single
          LOG_LEVEL=debug
          SESSION_DRIVER=array
          QUEUE_CONNECTION=sync
          MAIL_MAILER=log
          EOF

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress --optimize-autoloader

      - name: Dump autoload
        run: composer dump-autoload

      - name: Clear Laravel caches
        run: |
          php artisan config:clear
          php artisan cache:clear
          php artisan view:clear
          php artisan route:clear

      - name: Generate application key
        run: php artisan key:generate

      - name: Run database migrations
        env:
          APP_ENV: testing
        run: php artisan migrate:fresh --seed --force

      - name: Install Node dependencies
        run: |
          npm ci --no-audit --no-fund

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Build frontend assets
        run: npm run build

      - name: Verify build output
        run: |
          echo "=== Checking built assets ==="
          ls -la public/build/ || echo "public/build directory not found!"

          echo "=== Manifest content ==="
          if [ -f public/build/manifest.json ]; then
            cat public/build/manifest.json | head -50
          else
            echo "ERROR: No manifest.json found!"
            exit 1
          fi

      - name: Start Laravel server
        env:
          APP_ENV: testing
          APP_DEBUG: true
        run: |
          mkdir -p storage/logs
          php artisan serve --host=0.0.0.0 --port=8005 > server.log 2>&1 &
          SERVER_PID=$!
          echo "SERVER_PID=$SERVER_PID" >> $GITHUB_ENV

          # Wait for server to start
          echo "Waiting for server to start..."
          for i in {1..30}; do
            if curl -s -f http://localhost:8005 > /dev/null 2>&1; then
              echo "✓ Server is ready!"
              break
            fi
            echo "Attempt $i: Server not ready yet..."
            sleep 2
          done

      - name: Debug HTML and assets
        run: |
          echo "=== HTML served ==="
          curl -s http://localhost:8005 | head -100

          echo -e "\n=== Script tags ==="
          curl -s http://localhost:8005 | grep -oE 'src="[^"]*\.js"' || echo "No JS scripts found"

          echo -e "\n=== Link tags ==="
          curl -s http://localhost:8005 | grep -oE 'href="[^"]*\.css"' || echo "No CSS links found"

          echo -e "\n=== Testing API status ==="
          curl -s http://localhost:8005/api/test/status || echo "API test failed"

      - name: Run CodeceptJS tests
        working-directory: tests-js
        env:
          CI: true
          HEADLESS: true
          APP_URL: http://localhost:8005
          DEBUG: pw:api
        run: |
          npx codeceptjs run --steps --verbose 2>&1 | tee test-output.log

      - name: Stop Laravel server
        if: always()
        run: |
          if [ -n "$SERVER_PID" ]; then
            kill $SERVER_PID || true
          fi

      - name: Upload logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: debug-logs
          path: |
            storage/logs/
            server.log
            .env
            public/build/manifest.json

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-artifacts
          path: |
            tests-js/output/
            tests-js/test-output.log
            storage/logs/laravel.log
